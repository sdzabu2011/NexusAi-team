<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusAI Team — 12 AI Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
</head>
<body>

  <!-- ══ VIDEO BACKGROUND ════════════════════════════════════════════════ -->
  <div id="videoBg">
    <video id="bgVideo" muted loop playsinline autoplay></video>
    <div id="videoOverlay"></div>
  </div>

  <!-- ══ CANVAS ══════════════════════════════════════════════════════════ -->
  <canvas id="agentCanvas"></canvas>

  <!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
  <header id="mainHeader">
    <div class="logo">
      <span class="logo-nexus">NEXUS</span><span class="logo-ai">AI</span>
      <span class="logo-tag">TEAM</span>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="modelCount">Fetching models…</span>
      <span class="sep">·</span>
      <span id="updateTimer">Refresh in 60s</span>
    </div>

    <div class="header-actions">
      <button class="btn-glass" id="viewCodeBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Source
      </button>
      <button class="btn-primary" id="downloadBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download ZIP
      </button>
    </div>
  </header>

  <!-- ══ HINT ════════════════════════════════════════════════════════════ -->
  <div id="clickHint">Click any agent to chat · Click NEXUS for dashboard</div>

  <!-- ══ AGENT MODAL ═════════════════════════════════════════════════════ -->
  <div id="agentModal" class="modal hidden">
    <div class="modal-inner" id="agentModalInner">

      <div class="modal-header">
        <div>
          <div class="modal-agent-tag" id="modalTag">CODE</div>
          <div class="modal-title" id="modalTitle">Code Writer AI</div>
        </div>
        <div class="modal-header-right">
          <select id="modelSelect" class="model-select">
            <option value="">Loading models…</option>
          </select>
          <button class="btn-close" id="closeModal">✕</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-row">
        <textarea id="userInput" placeholder="Type your message… (Enter to send)" rows="2"></textarea>
        <button class="btn-send" id="sendBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>

    </div>
  </div>

  <!-- ══ DASHBOARD MODAL ═════════════════════════════════════════════════ -->
  <div id="dashModal" class="modal hidden">
    <div class="modal-inner dash-inner">
      <div class="modal-header">
        <div class="modal-title">⬡ NEXUS Dashboard</div>
        <button class="btn-close" id="closeDash">✕</button>
      </div>
      <div id="dashContent" class="dash-content"></div>
    </div>
  </div>

  <!-- ══ CODE VIEWER MODAL ═══════════════════════════════════════════════ -->
  <div id="codeModal" class="modal hidden">
    <div class="modal-inner code-modal-inner">
      <div class="modal-header">
        <div class="modal-title">📁 Source Code</div>
        <div style="display:flex;gap:8px">
          <button class="btn-glass" id="downloadCodeBtn">⬇ Download All</button>
          <button class="btn-close" id="closeCode">✕</button>
        </div>
      </div>
      <div class="code-layout">
        <div class="file-tree" id="fileTree"></div>
        <div class="code-viewer" id="codeViewer">
          <div class="code-placeholder">← Select a file to view its source</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
