<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NexusAI Team — 12 AI Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Orbitron:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <!-- Syntax highlight -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- HLS -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
</head>
<body>

<!-- ═══ VIDEO BACKGROUND ════════════════════════════════════════════ -->
<div id="videoBg">
  <video id="bgVideo" muted loop playsinline autoplay></video>
  <div id="videoOverlay"></div>
</div>

<!-- ═══ GRID LINES ══════════════════════════════════════════════════ -->
<div id="gridLines"></div>

<!-- ═══ CANVAS ══════════════════════════════════════════════════════ -->
<canvas id="agentCanvas"></canvas>

<!-- ═══ HEADER ══════════════════════════════════════════════════════ -->
<header id="mainHeader">
  <div class="logo">
    <div class="logo-hex">⬡</div>
    <div class="logo-text">
      <span class="logo-nexus">NEXUS</span><span class="logo-ai">AI</span>
      <span class="logo-tag">TEAM v2.0</span>
    </div>
  </div>

  <div class="header-center">
    <div class="pill-status" id="statusPill">
      <span class="dot" id="statusDot"></span>
      <span id="modelCount">Connecting…</span>
    </div>
    <div class="pill-status dim">
      <span class="icon-clock">◷</span>
      <span id="updateTimer">60s</span>
    </div>
    <div class="pill-status dim" id="pillRequests">
      <span>⚡</span>
      <span id="reqCount">0 chats</span>
    </div>
  </div>

  <div class="header-actions">
    <button class="btn-ghost" id="viewCodeBtn" title="Browse source code">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Source
    </button>
    <button class="btn-ghost" id="dashBtn" title="Open dashboard">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="btn-primary" id="downloadBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      ZIP
    </button>
  </div>
</header>

<!-- ═══ HINT ═════════════════════════════════════════════════════════ -->
<div id="clickHint">
  <span>Click an agent to chat</span>
  <span class="sep">·</span>
  <span>Click <strong>NEXUS</strong> for live dashboard</span>
</div>

<!-- ═══ TOAST ════════════════════════════════════════════════════════ -->
<div id="toastContainer"></div>

<!-- ═══════════════════════════════════════════════════════════════════
     AGENT CHAT MODAL
════════════════════════════════════════════════════════════════════ -->
<div id="agentModal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-inner" id="agentModalInner">

    <div class="modal-header">
      <div class="modal-agent-info">
        <div class="modal-agent-badge" id="modalBadge">CODE</div>
        <div>
          <div class="modal-agent-tag" id="modalTag">CODE</div>
          <div class="modal-title" id="modalTitle">Code Writer AI</div>
          <div class="modal-subtitle" id="modalSubtitle">Ready to help</div>
        </div>
      </div>
      <div class="modal-header-right">
        <select id="modelSelect" class="model-select"></select>
        <button class="btn-icon" id="clearChatBtn" title="Clear conversation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
        <button class="btn-icon" id="closeModal">✕</button>
      </div>
    </div>

    <!-- Token / model info bar -->
    <div class="chat-info-bar" id="chatInfoBar">
      <span id="chatModelLabel">No model selected</span>
      <span class="spacer"></span>
      <span id="chatMsgCount">0 messages</span>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="chat-welcome" id="chatWelcome">
        <div class="welcome-icon" id="welcomeIcon">⬡</div>
        <div class="welcome-text" id="welcomeText">Select a model and start chatting</div>
      </div>
    </div>

    <div class="typing-indicator hidden" id="typingIndicator">
      <span></span><span></span><span></span>
    </div>

    <div class="chat-input-row">
      <textarea id="userInput" placeholder="Message… (Enter = send, Shift+Enter = newline)" rows="2" maxlength="8000"></textarea>
      <div class="input-actions">
        <span id="charCount" class="char-count">0</span>
        <button class="btn-send" id="sendBtn" title="Send message">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     DASHBOARD MODAL
════════════════════════════════════════════════════════════════════ -->
<div id="dashModal" class="modal hidden">
  <div class="modal-inner dash-modal-inner">

    <div class="modal-header">
      <div class="modal-title">
        <span style="color:var(--accent)">⬡</span> NexusAI Dashboard
      </div>
      <button class="btn-icon" id="closeDash">✕</button>
    </div>

    <!-- Tab bar -->
    <div class="dash-tabs">
      <button class="dash-tab active" data-tab="overview">Overview</button>
      <button class="dash-tab" data-tab="models">Models</button>
      <button class="dash-tab" data-tab="agents">Agents</button>
      <button class="dash-tab" data-tab="log">Server Log</button>
    </div>

    <!-- Tab panels -->
    <div class="dash-panel active" id="tab-overview">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="uptime-bar-wrap">
        <div class="dash-section-label">SERVER UPTIME</div>
        <div class="uptime-bar"><div id="uptimeFill"></div></div>
        <div id="uptimeLabel" class="uptime-label">—</div>
      </div>
    </div>

    <div class="dash-panel" id="tab-models">
      <div class="model-search-row">
        <input type="text" id="modelSearch" class="search-input" placeholder="🔍 Search models…"/>
        <div id="modelProviderTabs" class="provider-tabs">
          <button class="ptab active" data-p="all">All</button>
          <button class="ptab" data-p="openrouter">OpenRouter</button>
          <button class="ptab" data-p="groq">Groq</button>
        </div>
      </div>
      <div class="model-table-wrap">
        <table class="model-table">
          <thead><tr><th>Model</th><th>Provider</th><th>Context</th></tr></thead>
          <tbody id="modelTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="dash-panel" id="tab-agents">
      <div class="agent-stats-grid" id="agentStatsGrid"></div>
    </div>

    <div class="dash-panel" id="tab-log">
      <div class="log-list" id="logList"></div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     CODE VIEWER MODAL
════════════════════════════════════════════════════════════════════ -->
<div id="codeModal" class="modal hidden">
  <div class="modal-inner code-modal-inner">
    <div class="modal-header">
      <div class="modal-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Source Code
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-ghost" id="copyFileBtn">Copy</button>
        <button class="btn-ghost" id="dlZipBtn">⬇ ZIP</button>
        <button class="btn-icon" id="closeCode">✕</button>
      </div>
    </div>
    <div class="code-layout">
      <div class="file-sidebar" id="fileSidebar"></div>
      <div class="code-area" id="codeArea">
        <div class="code-placeholder">← Select a file</div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
